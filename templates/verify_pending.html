{% extends "base.html" %}
{% block title %}이메일 인증 - AquaPet{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card" style="text-align: center;">

    <div style="font-size: 3.5rem; margin-bottom: 16px;">✉️</div>
    <h2 style="margin-bottom: 12px;">이메일을 확인해주세요</h2>
    <p style="color: var(--text-muted); margin-bottom: 8px;">
      아래 주소로 인증 메일을 발송했습니다.
    </p>
    <p style="font-weight: 700; color: var(--primary-dark); margin-bottom: 24px; font-size: 1.05rem;">
      {{ email }}
    </p>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px;">
      메일 내 <strong>이메일 인증하기</strong> 버튼을 클릭하면 계정이 활성화됩니다.<br>
      인증 링크는 <strong>1시간</strong> 후 만료됩니다.
    </p>

    <form method="post" action="{{ url_for('resend_verification') }}">
      <input type="hidden" name="email" value="{{ email }}">
      <button type="submit" class="btn btn-outline btn-full">인증 메일 재발송</button>
    </form>

    <p class="auth-footer" style="margin-top: 20px;">
      <a href="{{ url_for('login') }}">로그인 페이지로 돌아가기</a>
    </p>
  </div>
</div>
{% endblock %}
