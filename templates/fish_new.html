{% extends "base.html" %}
{% block title %}분양 등록 - AquaPet{% endblock %}

{% block content %}
<div class="container">
  <div class="form-card">
    <h2>분양 등록</h2>

    <form method="post" enctype="multipart/form-data">
      <div class="form-group">
        <label>제목 *</label>
        <input type="text" name="title" placeholder="예) 풀레드 구피 쌍 분양합니다" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>어종 *</label>
          <select name="category" required>
            <option value="">어종 선택</option>
            {% for ft in fish_types %}
              <option value="{{ ft }}">{{ ft }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>성별</label>
          <select name="gender">
            {% for g in genders %}
              <option value="{{ g }}">{{ g }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>세부 어종 <span style="color:var(--text-muted); font-weight:400;">(선택)</span></label>
        <input type="text" name="species" placeholder="예) 구피, 베타, 네온테트라">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>가격 (원) *</label>
          <input type="number" name="price" placeholder="0" min="0" required>
        </div>
        <div class="form-group">
          <label>크기</label>
          <input type="text" name="weight" placeholder="예) 5cm, 성체, 치어">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>수량</label>
          <input type="text" name="quantity" placeholder="예) 1마리, 10마리, 한 쌍">
        </div>
        <div class="form-group">
          <label>판매 방법 *</label>
          <select name="trade_type" required>
            <option value="직거래">직거래</option>
            <option value="택배">택배</option>
            <option value="직거래 · 택배">직거래 · 택배 모두 가능</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>지역 (시/도)</label>
          <select name="location">
            <option value="">선택 안 함</option>
            {% for r in regions %}
              <option value="{{ r }}">{{ r }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>상품 설명</label>
        <textarea name="description" rows="5"
          placeholder="건강 상태, 사육 환경, 특징 등을 자세히 적어주세요."></textarea>
      </div>

      <div class="form-group">
        <label>사진 업로드 <span style="color:var(--text-muted); font-weight:400;">(여러 장 선택 가능)</span></label>
        <div class="file-upload">
          <input type="file" name="images" accept="image/*" id="imageInput" multiple
                 onchange="previewImages(this)">
          <label for="imageInput" class="file-label">📷 사진 선택</label>
        </div>
        <div id="previewContainer" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;"></div>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('index') }}" class="btn btn-outline">취소</a>
        <button type="submit" class="btn btn-primary">등록하기</button>
      </div>
    </form>
  </div>
</div>

<script>
function previewImages(input) {
  const container = document.getElementById('previewContainer');
  container.innerHTML = '';
  Array.from(input.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.createElement('img');
      img.src = e.target.result;
      img.style.cssText = 'width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--border);';
      container.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
}
</script>
{% endblock %}
