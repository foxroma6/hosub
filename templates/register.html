{% extends "base.html" %}
{% block title %}회원가입 - 피시마켓{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>회원가입</h2>

    <div class="social-buttons">
      <a href="{{ url_for('naver_login') }}" class="btn-social btn-naver">
        <span class="social-icon">N</span> 네이버로 시작하기
      </a>
      <a href="{{ url_for('kakao_login') }}" class="btn-social btn-kakao">
        <span class="social-icon">K</span> 카카오로 시작하기
      </a>
    </div>

    <div class="divider"><span>또는 이메일로 가입</span></div>

    <form method="post">
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" name="username" placeholder="닉네임 입력" required>
      </div>
      <div class="form-group">
        <label>이메일</label>
        <input type="email" name="email" placeholder="이메일 입력" required>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호 입력 (6자 이상)" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full">가입하기</button>
    </form>

    <p class="auth-footer">
      이미 계정이 있으신가요? <a href="{{ url_for('login') }}">로그인</a>
    </p>
  </div>
</div>
{% endblock %}
