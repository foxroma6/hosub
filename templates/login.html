{% extends "base.html" %}
{% block title %}로그인 - 피시마켓{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h2>로그인</h2>

    <form method="post">
      <div class="form-group">
        <label>이메일</label>
        <input type="email" name="email" placeholder="이메일 입력" required>
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호 입력" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">로그인</button>
    </form>

    {% if unverified_email %}
    <div style="margin-top: 16px; padding: 12px 16px; background: #FFF8E1; border-radius: 8px; font-size: 0.88rem; color: #7A5A20;">
      인증 메일을 받지 못하셨나요?
      <a href="{{ url_for('verify_pending', email=unverified_email) }}" style="color: var(--primary-dark); font-weight: 600;">재발송하기</a>
    </div>
    {% endif %}

    <p class="auth-footer">
      아직 계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a>
    </p>
  </div>
</div>
{% endblock %}
